Name: fms
Host: 0.0.0.0
Port: 9102
MaxBytes: 1073741824 # max content length : 1 gb | 所有类型单个文件最大大小
Timeout: 300000 # bigger max bytes need longer timeout | 超时时间
Middlewares:
  Tenant: true

Etcd:
  Hosts:
    - mingyang-etcd-test-service.mingyang-admin.svc.cluster.local:2379
  Key: fms.api

Auth:
  AccessSecret: jS6VKDtsJf3z1n2VKDtsJf3z1n2  # JWT key
  AccessExpire: 259200  # Seconds

CROSConf:
  Address: '*'

Log:
  ServiceName: fileTenantManagerLogger
  Mode: console
  Path: /home/data/logs
  Level: info
  Compress: false
  KeepDays: 7
  StackCoolDownMillis: 100

RedisConf:
  Host: 192.168.201.52:30379
  Db: 0
  Pass: 'MyRedis2026Pwd'

I18nConf:
  Dir:

DatabaseConf:
  Type: postgres
  Host: 192.168.201.52
  Port: 30891
  DBName: simple_admin_dev
  Username: myuser
  Password: 'PgsqlPwd!2026My'
  MaxOpenConn: 100
  SSLMode: disable
  CacheTime: 5
  # 添加以下配置启用 SQL 日志
  Debug: true
  LogSlowThreshold: 600ms

# CasbinDatabaseConf sets the core database if you use the Casbin of Core.
CasbinDatabaseConf:
  Type: postgres
  Host: 192.168.201.52
  Port: 30891
  DBName: simple_admin_dev
  Username: myuser
  Password: 'PgsqlPwd!2026My'
  MaxOpenConn: 100
  SSLMode: disable
  CacheTime: 5

UploadConf:
  MaxImageSize: 33554432  # 32 mb
  MaxVideoSize: 1073741824 # 1gb
  MaxAudioSize: 33554432  # 32mb
  MaxOtherSize: 10485760  # 10 mb
  PrivateStorePath: /home/data/file/private  # private
  PublicStorePath: /home/data/file/public  # public path for every one access e.g. nginx path
  ServerURL: "http://localhost:81"
  DeleteFileWithCloud: true # whether to delete the cloud files when delete local data | 是否删除本地文件的同时删除云端文件

CoreRpc:
  #Target: 127.0.0.1:9101
  Etcd:
    Hosts:
      - my-etcd.default.svc.cluster.local:2379  # 共享etcd地址
    Key: mingyang.core.rpc
  Enabled: true
  Timeout: 6000
  Keepalive:
    Time: 10s
    Timeout: 20s
    PermitWithoutStream: true

CasbinConf:
  ModelText: |
    [request_definition]
    r = sub, obj, act, domain
    [policy_definition]
    p = sub, obj, act, domain
    [role_definition]
    g = _, _
    [policy_effect]
    e = some(where (p.eft == allow))
    [matchers]
    m = r.sub == p.sub && keyMatch2(r.obj,p.obj) && r.act == p.act && r.domain == p.domain    
